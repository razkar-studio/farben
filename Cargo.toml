[workspace]
members = [
    "farben", "farben-build", "farben-core",
    "farben-macros", "farben-md", "testfarbenyay",
]
resolver = "3"

[workspace.dependencies]
farben-build = { path = "farben-build", version = "0.1.0" }
farben-core = { path = "farben-core", version = "0.10.0" }
farben-macros = { path = "farben-macros", version = "0.5.0" }
farben-md = { path = "farben-md", version = "0.1.3" }
