[workspace]
members = [
    "farben", "farben-core",
    "farben-macros", "farben-md",
]
resolver = "3"

[workspace.dependencies]
farben-core = { path = "farben-core", version = "0.6.4" }
farben-macros = { path = "farben-macros", version = "0.4.2" }
farben-md = { path = "farben-md", version = "0.1.3" }
